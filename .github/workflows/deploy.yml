name: Deploy LangGraph Agent

on:
  push:
    branches:
      - main

env:
  ACR_NAME: ajsagenticacr123
  IMAGE_NAME: langgraph-agent
  RESOURCE_GROUP: ajs-agentic-ai-demo-rg
  WEBAPP_NAME: ajs-agentic-webapp

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: |
        az acr login --name $ACR_NAME

    - name: Build Docker Image
      run: |
        docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:latest .

    - name: Push Image to ACR
      run: |
        docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest

    - name: Deploy to Azure App Service
      run: |
        az webapp config container set \
          --name $WEBAPP_NAME \
          --resource-group $RESOURCE_GROUP \
          --docker-custom-image-name $ACR_NAME.azurecr.io/$IMAGE_NAME:latest \
          --docker-registry-server-url https://$ACR_NAME.azurecr.io
